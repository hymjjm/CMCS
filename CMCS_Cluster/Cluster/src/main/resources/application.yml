server:
  ip: 127.0.0.1
  port: 9012


spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/jjm?characterEncoding=UTF-8&allowMultiQueries=true&rewriteBatchedStatements=true
    username: root
    password: #自己设置的MySQL数据库密码
  servlet:
    multipart:
      enabled: true
      location: E:\jjm\tmp # 设置临时目录的路径
      max-request-size: 52128800
      max-file-size: 50MB

  http:
    multipart:
      enabled: false


mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl


mybatis:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.xiangshu.test.entity
